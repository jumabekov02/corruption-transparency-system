# Defines the services (containers) that make up the system.
# Start everything with:  docker compose up --build

services:
  # ---------- PostgreSQL database ----------
  db:
    image: postgres:16-alpine          # ready-made Postgres image (no Dockerfile needed)
    restart: unless-stopped
    environment:                       # Postgres reads these to create the DB + user
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"                    # host:container — lets you connect from your PC too
    volumes:
      - db_data:/var/lib/postgresql/data   # persist data between restarts
    healthcheck:                       # backend waits until this passes
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ---------- FastAPI backend ----------
  backend:
    build: ./backend                   # build the image from backend/Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy     # don't start until Postgres is ready
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_HOST: db                # the service name "db" resolves to its container
      POSTGRES_PORT: 5432
      BACKEND_CORS_ORIGINS: ${BACKEND_CORS_ORIGINS}
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app                 # mount code so edits reload without rebuilding
    # Apply any pending DB migrations first, then start the API server.
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  # ---------- React frontend (Vite dev server) ----------
  frontend:
    build: ./frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL}
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app                # mount code for live reload
      - /app/node_modules              # keep the container's installed packages (don't let the host shadow them)
    command: npm run dev -- --host 0.0.0.0

volumes:
  db_data:                             # named volume managed by Docker
